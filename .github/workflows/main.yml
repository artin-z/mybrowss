name: Run main.py with Playwright

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

# فقط یک اجرا در هر زمان مجاز است – بقیه در صف می‌مانند
concurrency:
  group: bot-run
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxext6 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64
          sudo rm -rf /var/lib/apt/lists/*

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install --no-cache-dir --upgrade -r requirements.txt

      - name: Install Playwright Chromium & system deps
        run: playwright install --with-deps chromium

      - name: Run bot in background and wait
        run: |
          python main.py &
          BOT_PID=$!
          echo "Bot started with PID $BOT_PID"
          sleep 300m
          echo "Shutting down bot..."
          kill $BOT_PID
          wait $BOT_PID || true
          echo "Bot stopped."

      - name: Commit and push database
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add bot_data.db
          git commit -m "Update bot_data.db [skip ci]" || echo "No changes to commit"

          # ابتدا تغییرات ریموت را دریافت کن
          git fetch origin main

          # rebase روی ریموت انجام بده و در صورت تداخل، نسخه‌ی ما (ours) را نگه دار
          # توجه: چون فایل دیتابیس باینری است، گیت نمی‌تواند خودکار merge کند،
          # بنابراین در صورت تداخل از ours استفاده می‌کنیم.
          git rebase origin/main || {
            # اگر rebase به دلیل تداخل متوقف شد، تداخل‌ها را با قبول نسخه‌ی ما حل کن
            git checkout --ours bot_data.db 2>/dev/null || true
            git add bot_data.db
            git rebase --continue
          }

          git push
